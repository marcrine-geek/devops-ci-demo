name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run test (requires DEMO_API_KEY)
        env: 
          DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}
        run: npm test
